name: Reservation Service Tests

on:
  push:
    paths:
      - "reservation-service/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: reservation-service

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
