name: Build and Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: user-service
            context: .
            dockerfile: user-service/Dockerfile
          - service: court-service
            context: ./court-service
            dockerfile: Dockerfile
          - service: reservation-service
            context: .
            dockerfile: reservation-service/Dockerfile
          - service: notification-service
            context: ./notification-service
            dockerfile: Dockerfile
          - service: api-gateway
            context: .
            dockerfile: api-gateway/Dockerfile
          - service: api-gateway-mobile
            context: .
            dockerfile: api-gateway-mobile/Dockerfile
          - service: web-client
            context: ./web-client
            dockerfile: Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context == '.' && matrix.dockerfile || format('{0}/{1}', matrix.context, matrix.dockerfile) }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tennis-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tennis-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
