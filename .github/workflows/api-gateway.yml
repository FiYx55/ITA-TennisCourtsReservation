name: API Gateway Tests

on:
  push:
    paths:
      - "api-gateway/**"
      - ".github/workflows/api-gateway.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api-gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npx vitest run
        env:
          NODE_ENV: test
          PORT: 2001
          USER_SERVICE_GRPC_URL: localhost:2002
          COURT_SERVICE_URL: http://localhost:2003
          RESERVATION_SERVICE_URL: http://localhost:2004
          NOTIFICATION_SERVICE_URL: http://localhost:2006
