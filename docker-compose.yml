      context: ./court-service
      dockerfile: Dockerfile
    container_name: tennis-court-service
    ports:
      - "${COURT_SERVICE_PORT}:${COURT_SERVICE_PORT}"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: courts_db
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_PORT: ${COURT_SERVICE_PORT}
    depends_on:
